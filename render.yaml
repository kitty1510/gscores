databases:
  - name: gscores-db
    databaseName: gscores
    plan: free

services:
  - type: web
    name: gscores-backend
    env: node
    plan: free
    rootDir: src/BE
    buildCommand: npm install && npm run build
    startCommand: >-
      sh -c "
      node ./node_modules/typeorm/cli.js migration:run -d dist/config/typeorm.config.js &&
      (node dist/database/seeds/import-csv.seeder.js || echo 'seed skipped') &&
      node dist/main
      "
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: CSV_PATH
        value: ../../dataset/diem_thi_thpt_2024.csv
      - key: DB_HOST
        fromDatabase:
          name: gscores-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: gscores-db
          property: port
      - key: DB_USERNAME
        fromDatabase:
          name: gscores-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: gscores-db
          property: password
      - key: DB_DATABASE
        fromDatabase:
          name: gscores-db
          property: database

  - type: web
    name: gscores-frontend
    env: static
    plan: free
    rootDir: src/FE
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
